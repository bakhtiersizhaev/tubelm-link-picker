<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="TubeLM Link Picker copies selected YouTube video and Shorts URLs for NotebookLM, AI notes, and research workflows.">
  <title>TubeLM Link Picker - YouTube links for NotebookLM</title>
  <link rel="icon" href="../docs/assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="frame" aria-labelledby="appTitle">
    <header class="top">
      <div class="brand">
        <div class="logo" aria-hidden="true">TL</div>
        <div>
          <h1 class="name" id="appTitle">TubeLM</h1>
          <p class="tag">YouTube links for NotebookLM</p>
        </div>
      </div>
      <span class="status" id="tabStatus" aria-live="polite">Checking tab…</span>
    </header>

    <section class="metric" aria-live="polite">
      <div>
        <p class="label">Selected</p>
        <p class="value" id="statCount">0</p>
      </div>
      <p class="note" id="statNote">Select videos to build a clean list.</p>
    </section>

    <button id="copySelectedBtn" class="btn primary" type="button" disabled>
      <span class="btn-label" id="copyLabel">Copy selection</span>
      <span class="btn-hint" id="copyHint">Newline list for NotebookLM</span>
    </button>

    <div class="actions">
      <button id="selectAllBtn" class="btn ghost" type="button">Select visible</button>
      <button id="clearBtn" class="btn ghost subtle" type="button">Clear</button>
    </div>

    <p class="footer">Built for channel pages, playlists, search results, and Shorts grids.</p>
  </main>
  <script src="popup.js"></script>
</body>
</html>
