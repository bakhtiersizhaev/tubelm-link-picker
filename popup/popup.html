<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URLTube</title>
  <link rel="stylesheet" href="popup.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="frame">
    <header class="top">
      <div class="brand">
        <div class="logo">URL</div>
        <div>
          <p class="name">URLTube</p>
          <p class="tag">YouTube link collector</p>
        </div>
      </div>
      <span class="status" id="tabStatus" aria-live="polite">Checking tab…</span>
    </header>

    <section class="metric" aria-live="polite">
      <div>
        <p class="label">Selected</p>
        <p class="value" id="statCount">0</p>
      </div>
      <p class="note" id="statNote">Select videos to build a clean list.</p>
    </section>

    <button id="copySelectedBtn" class="btn primary" disabled>
      <span class="btn-label" id="copyLabel">Copy selection</span>
      <span class="btn-hint" id="copyHint">Newline list for NotebookLM</span>
    </button>

    <div class="actions">
      <button id="selectAllBtn" class="btn ghost">Select visible</button>
      <button id="clearBtn" class="btn ghost subtle">Clear</button>
    </div>

    <p class="footer">Tip: hover a thumbnail to reveal its checkbox.</p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
